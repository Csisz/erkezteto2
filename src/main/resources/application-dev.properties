# ── Dev profile overrides ──────────────────────────────────────────────────────
# In-memory login credentials (dev only, never use in production)
app.dev-user=admin
app.dev-password=admin

# JWT secret must be at least 32 chars for HMAC-SHA256
jwt.secret=dev-secret-key-minimum-32-chars!!

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:erkezteto;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
