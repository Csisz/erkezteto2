spring.application.name=erkezteto2

# Database configuration
# Provide the full JDBC URL
#  jdbc:sqlserver://db-host:1433;databaseName=yourdb
spring.datasource.url=
# SQL Server driver
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
# Credentials
spring.datasource.username=
spring.datasource.password=

# Optional: JPA settings for development (adjust for production)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# If you prefer separate host/port/name variables, set DB_URL like:
#  jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:yourdb}

# JWT settings
jwt.secret=your_jwt_secret_key
jwt.expirationMs=86400000

# Server settings
server.port=8080

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.framework.ldap=WARN
logging.file.name=logs/erkezteto.log