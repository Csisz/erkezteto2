spring.application.name=erkezteto2
spring.profiles.active=dev

# Database configuration
# H2 in-memory database for local development
spring.datasource.url=jdbc:h2:mem:erkezteto;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JPA settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# If you prefer separate host/port/name variables, set DB_URL like:
#  jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:yourdb}

# JWT settings
jwt.secret=your_jwt_secret_key
jwt.expirationMs=86400000

# Server settings
server.port=8080

# Logging
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.framework.ldap=WARN
logging.file.name=logs/erkezteto.log